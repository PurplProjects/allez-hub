[phases.setup]
nixPkgs = ["nodejs_22", "chromium", "nss", "nspr", "atk", "cups", "libdrm", "mesa", "alsa-lib", "pango", "cairo", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "xorg.libXScrnSaver", "xorg.libxcb", "gtk3", "gdk-pixbuf", "libxkbcommon"]

[phases.install]
cmds = ["npm i"]

[phases.build]
cmds = ["echo 'No build step needed'"]

[start]
cmd = "PLAYWRIGHT_CHROMIUM_PATH=$(which chromium) npm start"
